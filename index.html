<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EcoTrack AI Pro</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="wrap">
<h1>🌱 EcoTrack AI Pro</h1>
<p>Carbon Footprint Awareness Platform</p>

<div class="card">
<input id="travel" type="number" placeholder="Daily travel (km)" value="15">
<input id="electricity" type="number" placeholder="Electricity (kWh/month)" value="180">
<input id="ac" type="number" placeholder="AC hours/day" value="5">

<select id="diet">
<option value="50">Vegetarian</option>
<option value="120">Non‑Vegetarian</option>
</select>

<button onclick="calculate()">Analyze Footprint</button>
</div>

<div class="card">
<h3>Results</h3>
<div id="score">Waiting for analysis...</div>
<div id="advice"></div>
</div>

<div class="card">
<h3>30-Day Reduction Plan</h3>
<ul>
<li>Use public transport twice a week</li>
<li>Reduce AC usage by 1 hour/day</li>
<li>Switch to LED lighting</li>
<li>Track electricity consumption weekly</li>
</ul>
</div>
</div>
<script src="script.js"></script>
</body>
</html>
